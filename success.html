<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Appointment Confirmed | Vetri Multispeciality Hospital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#e8f5e9,#f8fbff);

}

.box{

width:420px;
background:#fff;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.15);

}

.box i{

font-size:75px;
color:#28a745;
margin-bottom:20px;

}

.box h1{

color:#28a745;
margin-bottom:15px;

}

.box p{

color:#555;
margin-bottom:15px;

}

.details{

margin-top:20px;
padding:18px;
background:#f5f7fa;
border-radius:10px;
text-align:left;

}

.details p{

margin:10px 0;
font-size:16px;

}

.details span{

font-weight:bold;
color:#0d6efd;

}

a{

display:inline-block;
margin-top:25px;
padding:12px 30px;
background:#0d6efd;
color:white;
text-decoration:none;
border-radius:8px;
transition:.3s;

}

a:hover{

background:#0b5ed7;

}

</style>

</head>

<body>

<div class="box">

<i class="fa-solid fa-circle-check"></i>

<h1>Appointment Confirmed</h1>

<p>Your appointment has been booked successfully.</p>

<div class="details">

<p><strong>Hospital:</strong> Vetri Multispeciality Hospital</p>

<p><strong>Status:</strong> <span>Booked</span></p>

<p><strong>Appointment No:</strong> <span id="appointmentNo"></span></p>

</div>

<a href="home.html">Back to Home</a>

</div>

<script>

document.getElementById("appointmentNo").innerText =
localStorage.getItem("appointmentNo") || "Not Available";

</script>

</body>

</html>
